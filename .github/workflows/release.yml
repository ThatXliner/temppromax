name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --arch arm64

      - name: Package binary
        run: |
          BIN=.build/release/temppromax
          test -x "$BIN"
          tar -czf temppromax-macos-arm64.tar.gz -C .build/release temppromax
          shasum -a 256 temppromax-macos-arm64.tar.gz > temppromax-macos-arm64.tar.gz.sha256

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            temppromax-macos-arm64.tar.gz \
            temppromax-macos-arm64.tar.gz.sha256
