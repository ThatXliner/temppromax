name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      BIN: .build/release/temppromax
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --arch arm64

      - name: Import signing certificate
        env:
          DEVID_CERT_P12: ${{ secrets.DEVID_CERT_P12 }}
          DEVID_CERT_PASSWORD: ${{ secrets.DEVID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "$DEVID_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$DEVID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Sign binary
        run: |
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN" --sign "$SIGN_IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"

      - name: Notarize
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        run: |
          echo "$AC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k --keepParent "$BIN" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          rm -f "$RUNNER_TEMP/AuthKey.p8"
          # Bare CLI binaries can't be stapled; verify Gatekeeper accepts it instead.
          spctl --assess --type exec --verbose=4 "$BIN"

      - name: Package binary
        run: |
          test -x "$BIN"
          tar -czf temppromax-macos-arm64.tar.gz -C .build/release temppromax
          shasum -a 256 temppromax-macos-arm64.tar.gz > temppromax-macos-arm64.tar.gz.sha256

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN" || true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            temppromax-macos-arm64.tar.gz \
            temppromax-macos-arm64.tar.gz.sha256
