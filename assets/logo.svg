<svg width="560" height="180" viewBox="0 0 560 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="temppromax">
  <defs>
    <linearGradient id="heat" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Icon: a chip with a thermometer for the silicon-temperature theme -->
  <g transform="translate(28, 26)">
    <!-- Chip body -->
    <rect x="6" y="6" width="116" height="116" rx="20" fill="url(#chip)" stroke="#4b5563" stroke-width="2"/>

    <!-- Chip pins -->
    <g fill="#6b7280">
      <rect x="30" y="-4" width="6" height="12" rx="2"/>
      <rect x="61" y="-4" width="6" height="12" rx="2"/>
      <rect x="92" y="-4" width="6" height="12" rx="2"/>
      <rect x="30" y="120" width="6" height="12" rx="2"/>
      <rect x="61" y="120" width="6" height="12" rx="2"/>
      <rect x="92" y="120" width="6" height="12" rx="2"/>
      <rect x="-4" y="30" width="12" height="6" rx="2"/>
      <rect x="-4" y="61" width="12" height="6" rx="2"/>
      <rect x="-4" y="92" width="12" height="6" rx="2"/>
      <rect x="120" y="30" width="12" height="6" rx="2"/>
      <rect x="120" y="61" width="12" height="6" rx="2"/>
      <rect x="120" y="92" width="12" height="6" rx="2"/>
    </g>

    <!-- Inner die outline -->
    <rect x="26" y="26" width="76" height="76" rx="10" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4 4"/>

    <!-- Thermometer -->
    <g transform="translate(64, 22)">
      <!-- stem track -->
      <rect x="-7" y="0" width="14" height="62" rx="7" fill="#111827" stroke="#4b5563" stroke-width="2"/>
      <!-- mercury -->
      <rect x="-3.5" y="20" width="7" height="44" rx="3.5" fill="url(#heat)"/>
      <!-- bulb -->
      <circle cx="0" cy="74" r="13" fill="url(#heat)" stroke="#111827" stroke-width="2"/>
      <!-- tick marks -->
      <g stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round">
        <line x1="9" y1="12" x2="15" y2="12"/>
        <line x1="9" y1="26" x2="15" y2="26"/>
        <line x1="9" y1="40" x2="15" y2="40"/>
        <line x1="9" y1="54" x2="15" y2="54"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(170, 0)">
    <text x="0" y="90" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="46" font-weight="700" fill="#e5e7eb">temp</text>
    <text x="118" y="90" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="46" font-weight="700" fill="url(#wordmark)">promax</text>
    <text x="2" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#9ca3af">Apple Silicon temperature monitor</text>
  </g>
</svg>
